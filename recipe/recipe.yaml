schema_version: 1

context:
  version: "5.1.16"
  code_sha256: 7054de24b90b6d9533329ef8dc89912c5227c83fb447792103279364e13dd452
  data_sha256: 025d4bf904c28cc202f083a67b2ec0ffd68fa2b212a89de327a18cdca8698551

package:
  name: hdfeos5
  version: ${{ version }}

source:
  - url: https://git.earthdata.nasa.gov/rest/git-lfs/storage/DAS/hdfeos5/${{ code_sha256 }}?response-content-disposition=attachment%3B%20filename%3D%22HDF-EOS${{ version }}.tar.Z%22%3B%20filename*%3Dutf-8%27%27HDF-EOS${{ version }}.tar.Z
    sha256: ${{ code_sha256 }}
    # Setting file_name disables automatic extraction in rattler-build.
    # We extract these legacy .tar.Z archives manually in build.sh.
    file_name: HDF-EOS${{ version }}.tar.Z
  - url: https://git.earthdata.nasa.gov/rest/git-lfs/storage/DAS/hdfeos5/${{ data_sha256 }}?response-content-disposition=attachment%3B%20filename%3D%22HDF-EOS${{ version }}_TESTDRIVERS.tar.Z%22%3B%20filename*%3Dutf-8%27%27HDF-EOS${{ version }}_TESTDRIVERS.tar.Z
    sha256: ${{ data_sha256 }}
    file_name: HDF-EOS${{ version }}_TESTDRIVERS.tar.Z

build:
  number: 19
  skip: win

requirements:
  build:
    - if: unix
      then: gnuconfig
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - automake
    - autoconf
    - gzip
    - libtool
    - make
    - patch
  host:
    - hdf5
    - libaec
    - zlib
  run:
    - hdf5
    - libaec
    - zlib

tests:
  - script:
      - if: not win
        then: test -f ${PREFIX}/lib/libGctp.a
      - if: not win
        then: test -f ${PREFIX}/lib/libhe5_hdfeos.a

about:
  license: LicenseRef-HDFEOS5 AND LicenseRef-cfortran
  license_file: doc/README
  summary: Earth Observing System HDF
  homepage: http://hdfeos.org/index.php

extra:
  recipe-maintainers:
    - zklaus
    - ocefpaf
    - jhamman
    - khallock
    - snowman2
    - xylar
